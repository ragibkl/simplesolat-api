services:
  postgres:
    image: postgres:18-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: simplesolat_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  simplesolat-api:
    build: .
    environment:
      DATABASE_URL: postgres://user:password@postgres/simplesolat_db
    ports:
      - 3000:3000
    depends_on:
      - postgres

volumes:
  postgres_data:
